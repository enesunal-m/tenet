name: Bug report
description: Report a reproducible problem in tenet.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug. Please include enough detail for someone else to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps, commands, and minimal files needed to reproduce the issue.
      placeholder: |
        1. Run `tenet ...`
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tenet version
      placeholder: tenet 0.1.0
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: macOS 15, Ubuntu 24.04, Windows 11
