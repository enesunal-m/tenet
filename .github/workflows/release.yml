name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: x86_64-unknown-linux-gnu
          - os: macos-latest
            artifact: aarch64-apple-darwin
          - os: windows-latest
            artifact: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - run: cargo build --release --locked
      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/release/tenet.exe "dist/tenet-${{ matrix.artifact }}.exe"
          else
            cp target/release/tenet "dist/tenet-${{ matrix.artifact }}"
            tar -C dist -czf "dist/tenet-${{ matrix.artifact }}.tar.gz" "tenet-${{ matrix.artifact }}"
            rm "dist/tenet-${{ matrix.artifact }}"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: tenet-${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
